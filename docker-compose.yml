services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "8000:8000"
    environment:
      # Comma-separated list of allowed origins for CORS.
      # Same-origin deployments can leave this empty/unset.
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - SESSION_CACHE_DIR=/app/backend/session_cache
      - MAX_SESSIONS=${MAX_SESSIONS:-20}
      - SESSION_TTL_SECONDS=${SESSION_TTL_SECONDS:-1800}
    volumes:
      - session_cache:/app/backend/session_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  session_cache:
